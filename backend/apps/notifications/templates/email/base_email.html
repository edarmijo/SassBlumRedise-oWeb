<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}SassBlum{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f4f3ee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1d1c1a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f3ee;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border:0.5px solid #e7e5de;border-radius:12px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background:#1d1c1a;padding:20px 28px;">
              <span style="color:#ffffff;font-size:18px;font-weight:600;letter-spacing:0.3px;">SassBlum</span>
              <span style="color:#a8a6a0;font-size:12px;margin-left:8px;">Gestión de Tickets</span>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:28px;">
              <h1 style="font-size:18px;font-weight:600;margin:0 0 12px;color:#1d1c1a;">
                {% block titulo %}{{ titulo }}{% endblock %}
              </h1>
              <div style="font-size:14px;line-height:1.6;color:#3a3935;">
                {% block contenido %}
                <p>{{ cuerpo }}</p>
                {% endblock %}
              </div>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background:#faf9f7;padding:18px 28px;border-top:0.5px solid #e7e5de;">
              <p style="font-size:12px;color:#6f6e68;margin:0;line-height:1.5;">
                Este es un mensaje automático de SassBlum. Por favor no respondas a este correo.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
