name: CI SassBlum

on:
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Create CI env file
        run: |
          cat > .env << 'EOF'
          DJANGO_SECRET_KEY=ci-only-secret-key-not-used-in-production
          DJANGO_DEBUG=True
          DATABASE_URL=postgresql://ci:ci@localhost:5432/ci
          JWT_ACCESS_TOKEN_LIFETIME=3600
          JWT_REFRESH_TOKEN_LIFETIME=604800
          EOF

      - name: Django System Check
        run: python manage.py check

      - name: Run Unit Tests
        run: pytest -v -m "not django_db"

      - name: Run Flake8 (non-blocking)
        run: flake8 apps config core --max-line-length=120 --exclude=migrations
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Run Unit Tests
        run: npm run test
