version: '3.8'

services:
  # Redis for Django Channels
  redis:
    image: redis:7-alpine
    container_name: sassblum_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data

  # Django + Daphne backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sassblum_backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: dev-key-change-in-production
      DJANGO_DEBUG: "False"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      USE_REDIS: "True"
      CORS_ALLOWED_ORIGINS: http://localhost
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      JWT_ACCESS_TOKEN_LIFETIME: 3600
      JWT_REFRESH_TOKEN_LIFETIME: 604800
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      FRONTEND_URL: http://localhost
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React + nginx frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sassblum_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
